name: Update Profile Art

on:
  schedule:
    - cron: "17 6 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-heatmap:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Fetch GitHub contributions
        run: |
          python scripts/fetch_contributions.py

      - name: Generate animated heatmap
        run: |
          python scripts/render_heatmap_svg.py

      - name: Commit updated contribution graph
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
